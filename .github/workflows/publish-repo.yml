name: Publish Kodi Repository

on:
  push:
    branches: [main]
    paths:
      - 'service.kodi.ai/**'
      - 'tools/build_repo.py'
      - '.github/workflows/publish-repo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build repository
        run: python tools/build_repo.py --output dist
      - name: Copy README into Pages root
        run: cp README.md dist/ || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
